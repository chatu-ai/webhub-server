name: Build Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Backend-only Docker image (原有逻辑)
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=tag
            type=ref,event=branch

      - name: Build and push Backend-only Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: All-in-One Docker image (frontend + backend)
  allinone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest frontend release version
        id: frontend-version
        run: |
          # 获取最新的 v2026.* tag (从远程前端仓库)
          VERSION=""
          
          # 方法1: 从 API 获取最新 release (使用 PAT 以访问前端仓库)
          VERSION=$(curl -s -H "Authorization: Bearer ${{ secrets.FRONTEND_TOKEN }}" \
            https://api.github.com/repos/chatu-ai/chatu-web-hub-front/releases/latest | \
            grep -oP '"tag_name": "\K[^"]+' | head -1)
          
          if [ -z "$VERSION" ]; then
            echo "No release found, will skip allinone build"
            echo "version=none" >> $GITHUB_OUTPUT
          else
            echo "Frontend version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Skip allinone if no frontend release
        if: steps['frontend-version'].outputs.version == 'none'
        run: |
          echo "No frontend release found. Skipping allinone build."
          mkdir -p frontend-dist
          echo "No frontend release to download" > frontend-dist/.skip-allinone

      - name: Download frontend from GitHub Release
        if: steps['frontend-version'].outputs.version != 'none' && steps['frontend-version'].outputs.version != 'latest'
        run: |
          VERSION="${{ steps['frontend-version'].outputs.version }}"
          FILENAME="chatu-web-hub-front-${VERSION}.tar.gz"
          echo "Downloading $FILENAME from GitHub Release..."
          # 使用 GitHub Token 认证下载私有仓库的 Release 资产
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o "$FILENAME" \
            "https://github.com/chatu-ai/chatu-web-hub-front/releases/download/${VERSION}/${FILENAME}"
          echo "Downloaded: $FILENAME"
          ls -la "$FILENAME"

      - name: Prepare frontend files
        if: steps['frontend-version'].outputs.version != 'none' && steps['frontend-version'].outputs.version != 'latest'
        run: |
          # 解压前端 tar.gz 到 frontend/dist
          FRONTEND_TAR=$(ls *.tar.gz 2>/dev/null | head -1)
          if [ -n "$FRONTEND_TAR" ]; then
            mkdir -p frontend/dist
            tar -xzf "$FRONTEND_TAR" -C frontend/dist
            echo "Frontend extracted to frontend/dist"
            ls -la frontend/dist/
          else
            echo "Warning: No frontend tar.gz found"
          fi

      - name: Extract metadata for Docker (allinone)
        id: meta-allinone
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}:allinone
          tags: |
            type=raw,value=allinone
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push All-in-One Docker image
        if: steps['frontend-version'].outputs.version != 'none' && steps['frontend-version'].outputs.version != 'latest'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          file: Dockerfile.allinone
          tags: ${{ steps.meta-allinone.outputs.tags }}
          labels: ${{ steps.meta-allinone.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [backend, allinone]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment artifact
        run: |
          echo "Backend-only image: ${{ env.REGISTRY }}/${{ github.repository }}:latest"
          echo "All-in-One image: ${{ env.REGISTRY }}/${{ github.repository }}-allinone:allinone"
          echo "Run allinone: docker run -p 80:80 -p 3000:3000 ${{ env.REGISTRY }}/${{ github.repository }}-allinone:allinone"
